<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ece9ff"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8a7df0"/>
      <stop offset="1" stop-color="#6c5ce7"/>
    </linearGradient>
  </defs>
  <!-- pulse glow -->
  <circle cx="100" cy="110" r="86" fill="#6c5ce7" opacity="0.10"/>
  <!-- bells -->
  <path d="M44 44 L24 24" stroke="#6c5ce7" stroke-width="8" stroke-linecap="round"/>
  <path d="M156 44 L176 24" stroke="#6c5ce7" stroke-width="8" stroke-linecap="round"/>
  <circle cx="44" cy="44" r="14" fill="url(#ring)"/>
  <circle cx="156" cy="44" r="14" fill="url(#ring)"/>
  <!-- legs -->
  <path d="M52 162 L36 188" stroke="#6c5ce7" stroke-width="8" stroke-linecap="round"/>
  <path d="M148 162 L164 188" stroke="#6c5ce7" stroke-width="8" stroke-linecap="round"/>
  <!-- body -->
  <circle cx="100" cy="110" r="68" fill="url(#face)" stroke="url(#ring)" stroke-width="8"/>
  <!-- hour ticks -->
  <g stroke="#9c98b8" stroke-width="3" stroke-linecap="round">
    <line x1="100" y1="48" x2="100" y2="56"/>
    <line x1="100" y1="172" x2="100" y2="164"/>
    <line x1="38" y1="110" x2="46" y2="110"/>
    <line x1="162" y1="110" x2="154" y2="110"/>
  </g>
  <!-- hands -->
  <path d="M100 110 L100 70" stroke="#181432" stroke-width="6" stroke-linecap="round"/>
  <path d="M100 110 L132 124" stroke="#181432" stroke-width="6" stroke-linecap="round"/>
  <circle cx="100" cy="110" r="6" fill="#181432"/>
</svg>
